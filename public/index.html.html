<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Elimination Circle</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --bg: #0b0f19;
            --panel: #1e293b;
            --text: #f8fafc;
            --primary: #3b82f6;
            --danger: #ef4444;
            --success: #22c55e;
            --disabled: #334155;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg);
            color: var(--text);
            font-family: system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        .header { text-align: center; margin-bottom: 10px; }
        #room-info { color: #64748b; font-size: 0.9rem; margin-top: 5px;}
        #player-status { font-weight: bold; font-size: 1.1rem; margin-top: 5px; }
        .alive { color: var(--success); }
        .eliminated { color: var(--danger); }
        .spectating { color: #eab308; }

        .circle-container {
            position: relative;
            width: min(85vw, 450px);
            height: min(85vw, 450px);
            margin: 20px auto;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(30,41,59,0.6) 0%, rgba(15,23,42,0.8) 70%);
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .center-display { text-align: center; z-index: 10; pointer-events: none; }
        #timer-display { font-size: clamp(3rem, 10vw, 5rem); font-weight: 900; margin: 0; line-height: 1; }
        #phase-text { font-size: 1rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.1em; margin-top: 5px;}

        .num-node {
            position: absolute;
            width: clamp(35px, 10vw, 50px);
            height: clamp(35px, 10vw, 50px);
            border-radius: 50%;
            border: 2px solid #475569;
            background-color: var(--panel);
            color: var(--text);
            font-size: clamp(0.9rem, 2.5vw, 1.2rem);
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: translate(-50%, -50%);
            transition: all 0.15s ease;
            user-select: none;
            opacity: 0;
            pointer-events: none; /* Hidden by default */
        }

        .circle-container.phase-choice .num-node {
            opacity: 1;
            pointer-events: auto;
        }

        .num-node:hover {
            border-color: var(--primary);
            color: var(--primary);
            transform: translate(-50%, -50%) scale(1.1);
        }

        .num-node.selected {
            background-color: var(--primary);
            border-color: #60a5fa;
            color: white;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.6);
        }

        .num-node.disabled {
            background-color: var(--disabled);
            border-color: #1e293b;
            color: #475569;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>The Elimination Circle</h1>
        <div id="room-info">Connecting...</div>
        <div id="player-status">Status: Waiting...</div>
    </div>

    <div class="circle-container" id="wheel">
        <div class="center-display">
            <h1 id="timer-display">--</h1>
            <div id="phase-text">Waiting for players</div>
        </div>
    </div>

<script>
    const socket = io();
    const wheel = document.getElementById('wheel');
    const timerDisplay = document.getElementById('timer-display');
    const phaseText = document.getElementById('phase-text');
    const roomInfo = document.getElementById('room-info');
    const playerStatus = document.getElementById('player-status');

    let myChoice = null;
    let isAlive = true;

    // Build the 1-20 Circle Elements
    const totalNodes = 20;
    const radius = 41; 
    for (let i = 1; i <= totalNodes; i++) {
        const btn = document.createElement('button');
        btn.className = 'num-node';
        btn.textContent = i;
        btn.dataset.number = i;

        const angle = (i / totalNodes) * 2 * Math.PI - Math.PI / 2;
        const x = 50 + radius * Math.cos(angle);
        const y = 50 + radius * Math.sin(angle);
        btn.style.left = `${x}%`;
        btn.style.top = `${y}%`;

        btn.addEventListener('click', () => {
            if (!isAlive) return;
            document.querySelectorAll('.num-node').forEach(n => n.classList.remove('selected'));
            btn.classList.add('selected');
            myChoice = i;
            socket.emit('submit_choice', i);
        });

        wheel.appendChild(btn);
    }

    // Sync state updates from backend
    socket.on('state_update', (data) => {
        roomInfo.textContent = `👥 ${data.activePlayers}/${data.totalConnections} Players Alive`;
        timerDisplay.textContent = data.timeLeft;
        phaseText.textContent = data.phase.replace('_', ' ');

        // Manage wheel classes based on the active phase
        wheel.className = 'circle-container'; 
        if (data.phase === 'CHOICE_PHASE' && isAlive) {
            wheel.classList.add('phase-choice');
        }

        // Handle structural phase switches
        if (data.phase === 'BLIND_PHASE') {
            myChoice = null;
            document.querySelectorAll('.num-node').forEach(n => n.classList.remove('selected', 'disabled'));
        }
    });

    socket.on('player_status', (status) => {
        isAlive = (status === 'ALIVE');
        if (status === 'ALIVE') {
            playerStatus.className = 'alive';
            playerStatus.textContent = "Status: You are ALIVE";
        } else if (status === 'ELIMINATED') {
            playerStatus.className = 'eliminated';
            playerStatus.textContent = "Status: ELIMINATED ❌";
            document.querySelectorAll('.num-node').forEach(n => n.classList.add('disabled'));
        } else {
            playerStatus.className = 'spectating';
            playerStatus.textContent = "Status: Spectating (Mid-game join)";
            document.querySelectorAll('.num-node').forEach(n => n.classList.add('disabled'));
        }
    });

    socket.on('announcement', (msg) => {
        phaseText.textContent = msg;
    });
</script>
</body>
</html>
